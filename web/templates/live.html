<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live HUD — S-Type Telemetry</title>

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Phosphor icons -->
    <script src="https://unpkg.com/@phosphor-icons/web@2.0.3/src/index.js"></script>

    <style>
        :root {
            --bg-void: #080b10;
            --bg-glass: rgba(255, 255, 255, 0.04);
            --border: rgba(255, 255, 255, 0.08);
            --text-pure: #f0f4f8;
            --text-dim: #64748b;
            --neon-blue: #38bdf8;
            --neon-purple: #c084fc;
            --neon-green: #34d399;
            --neon-red: #f43f5e;
            --font-data: 'JetBrains Mono', 'Fira Code', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg-void);
            color: var(--text-pure);
            font-family: 'Inter', system-ui, sans-serif;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── Top bar ── */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            border-bottom: 1px solid var(--border);
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            flex-shrink: 0;
            z-index: 1000;
        }

        .topbar a {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: color 0.2s;
        }

        .topbar a:hover {
            color: var(--text-pure);
        }

        .topbar-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--neon-purple);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--neon-green);
            box-shadow: 0 0 8px var(--neon-green);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.5;
                transform: scale(1.3);
            }
        }

        /* ── Gauge row ── */
        .gauges {
            display: flex;
            gap: 12px;
            padding: 12px 16px;
            flex-shrink: 0;
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid var(--border);
        }

        .gauge {
            background: var(--bg-glass);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 18px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .gauge label {
            font-size: 0.65rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 2px;
        }

        .gauge .val {
            font-family: var(--font-data);
            font-size: 2.2rem;
            font-weight: 700;
            line-height: 1;
            color: var(--neon-blue);
        }

        .gauge .unit {
            font-size: 0.7rem;
            color: var(--text-dim);
            margin-left: 3px;
        }

        .gauge-ghost .val {
            color: var(--neon-purple);
        }

        /* ── Map fills the rest ── */
        #hudMap {
            flex: 1;
            width: 100%;
            min-height: 0;
            /* critical for flex children */
        }

        /* ── Floating destination overlay ── */
        .dest-overlay {
            position: fixed;
            top: 135px;
            right: 20px;
            z-index: 1001;
            background: rgba(0, 0, 0, 0.82);
            border: 1px solid var(--neon-purple);
            border-radius: 12px;
            padding: 14px 18px;
            backdrop-filter: blur(12px);
            min-width: 160px;
        }

        .dest-overlay .dest-label {
            font-size: 0.65rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .dest-overlay .dest-name {
            font-weight: 700;
            font-size: 1.05rem;
            color: var(--text-pure);
            margin-bottom: 10px;
        }

        .time-row {
            display: flex;
            gap: 16px;
        }

        .time-cell {
            display: flex;
            flex-direction: column;
        }

        .time-cell span:first-child {
            font-size: 0.6rem;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        .time-cell .time-val {
            font-family: var(--font-data);
            font-size: 1.1rem;
            font-weight: 700;
        }

        /* ── No trip screen ── */
        #noTrip {
            position: fixed;
            inset: 0;
            background: var(--bg-void);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            z-index: 2000;
        }

        #noTrip h2 {
            font-size: 1.4rem;
            color: var(--text-dim);
        }

        #noTrip p {
            color: var(--text-dim);
            font-size: 0.9rem;
        }

        #noTrip a {
            margin-top: 8px;
            color: var(--neon-blue);
            text-decoration: none;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>

    <!-- ── No trip state ── -->
    <div id="noTrip" style="display:none">
        <i class="ph ph-car" style="font-size:4rem; color:var(--text-dim); opacity:0.4"></i>
        <h2>No Active Trip</h2>
        <p>Start driving to enable the Live HUD.</p>
        <a href="/">← Back to Dashboard</a>
    </div>

    <!-- ── Normal HUD ── -->
    <div id="tripContent" style="display:none; flex-direction:column; height:100dvh;">
        <!-- Top bar -->
        <div class="topbar">
            <a href="/"><i class="ph ph-arrow-left"></i> Dashboard</a>
            <div class="topbar-title">
                <div class="live-dot"></div>
                LIVE HUD
            </div>
            <div style="width:80px"></div><!-- spacer -->
        </div>

        <!-- Gauges -->
        <div class="gauges">
            <div class="gauge">
                <label>Speed</label>
                <div class="val" id="hudSpeed">--<span class="unit">kph</span></div>
            </div>
            <div class="gauge">
                <label>RPM</label>
                <div class="val" id="hudRPM" style="font-size:1.5rem; color:var(--text-pure)">--</div>
            </div>
            <div class="gauge gauge-ghost" style="margin-left:auto">
                <label id="hudDeltaLabel">Ghost Lead</label>
                <div class="val" id="hudDelta" style="font-size:2rem">--:--</div>
            </div>
        </div>

        <!-- Map (fills remaining viewport) -->
        <div id="hudMap"></div>
    </div>

    <!-- Destination overlay (always on top of map) -->
    <div class="dest-overlay" id="destOverlay" style="display:none">
        <div class="dest-label">Target</div>
        <div class="dest-name" id="hudDest">Scanning...</div>
        <div class="time-row">
            <div class="time-cell">
                <span>Best</span>
                <span class="time-val" id="hudPB" style="color:var(--neon-blue)">--:--</span>
            </div>
            <div class="time-cell">
                <span>Now</span>
                <span class="time-val" id="hudCur" style="color:var(--text-pure)">--:--</span>
            </div>
        </div>
    </div>

    <script src="/static/live.js"></script>
    <script>
        // Show dest overlay only when tripContent is visible
        const tripContent = document.getElementById('tripContent');
        const destOverlay = document.getElementById('destOverlay');
        const observer = new MutationObserver(() => {
            destOverlay.style.display = tripContent.style.display !== 'none' ? 'block' : 'none';
        });
        observer.observe(tripContent, { attributes: true, attributeFilter: ['style'] });
    </script>
</body>

</html>
